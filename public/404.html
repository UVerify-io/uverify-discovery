<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UVerify | Technology and Trust</title>
  <script>
    var l = window.location;
    if (l.pathname.startsWith('/verify/') || l.pathname === '/verify') {
      l.replace('https://app.uverify.io' + l.pathname + l.search + l.hash);
    } else {
      // GitHub Pages SPA redirect: encode the path into the query string
      // so index.html can restore it before the router initializes.
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash
      );
    }
  </script>
</head>
<body></body>
</html>
